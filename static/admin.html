<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen p-4 sm:p-8 relative overflow-hidden">

    <div class="absolute top-[-20%] left-[20%] w-64 h-64 md:w-96 md:h-96 bg-rose-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-10"></div>

    <div class="max-w-5xl mx-auto relative z-10">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <h1 class="text-2xl sm:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-orange-500">🛡️ Admin Control Panel</h1>
            <a href="/" class="text-sm text-blue-400 hover:text-blue-300 border border-blue-400/30 px-4 py-2 rounded-lg transition hover:bg-blue-500/10 whitespace-nowrap">Return to Game</a>
        </div>

        <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-2xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="bg-slate-800/80 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider">
                            <th class="p-4 sm:p-5 font-semibold">User ID</th>
                            <th class="p-4 sm:p-5 font-semibold">Username</th>
                            <th class="p-4 sm:p-5 font-semibold">Total Score</th>
                            <th class="p-4 sm:p-5 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="divide-y divide-slate-800/50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. SECURITY CHECK: Kick out non-admins instantly
        if (localStorage.getItem('quack_is_admin') !== 'true') {
            window.location.href = '/';
        }

        // 2. Setup Headers to prove to the backend we are the admin
        const adminId = localStorage.getItem('quack_user_id');
        const fetchHeaders = { 
            'Content-Type': 'application/json',
            'x-user-id': adminId 
        };

        // 3. Fetch and display users
        async function loadUsers() {
            const tableBody = document.getElementById('user-table-body');
            try {
                const response = await fetch('/api/admin/users', { headers: fetchHeaders });
                
                if(!response.ok) throw new Error("Unauthorized");

                const users = await response.json();
                
                tableBody.innerHTML = users.map(user => `
                    <tr class="hover:bg-slate-800/30 transition">
                        <td class="p-4 sm:p-5 text-slate-500 font-mono">#${user.id}</td>
                        <td class="p-4 sm:p-5 font-medium ${user.is_admin ? 'text-amber-400' : 'text-slate-200'}">
                            ${user.username} ${user.is_admin ? '👑' : ''}
                        </td>
                        <td class="p-4 sm:p-5 font-bold text-emerald-400" id="score-${user.id}">${user.score}</td>
                        <td class="p-4 sm:p-5 text-right space-x-2">
                            
                            ${user.id !== parseInt(adminId) ? `
                                <button onclick="toggleAdmin(${user.id})" class="text-xs bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded transition shadow-lg shadow-purple-500/20">
                                    ${user.is_admin ? 'Demote' : 'Make Admin'}
                                </button>
                            ` : '<span class="text-xs text-slate-600 mr-2">You</span>'}
                            
                            ${!user.is_admin ? `
                                <button onclick="resetScore(${user.id})" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded transition">Reset</button>
                                <button onclick="deleteUser(${user.id})" class="text-xs bg-rose-600 hover:bg-rose-700 text-white px-3 py-1.5 rounded transition shadow-lg shadow-rose-500/20">Delete</button>
                            ` : '<span class="text-xs text-slate-600">Protected</span>'}
                            
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="4" class="p-5 text-center text-rose-400">Access Denied. You do not have admin privileges.</td></tr>';
            }
        }

        // 4. Admin Action Functions
        async function toggleAdmin(id) {
            if(!confirm("Are you sure you want to change this user's admin privileges?")) return;
            await fetch(`/api/admin/users/${id}/toggle_admin`, { method: 'PUT', headers: fetchHeaders });
            loadUsers(); // Reload table instantly
        }

        async function resetScore(id) {
            if(!confirm("Reset this user's score to 0?")) return;
            await fetch(`/api/admin/users/${id}/reset`, { method: 'PUT', headers: fetchHeaders });
            loadUsers(); // Reload table instantly
        }

        async function deleteUser(id) {
            if(!confirm("PERMANENTLY delete this user?")) return;
            await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers: fetchHeaders });
            loadUsers(); // Reload table instantly
        }
        
        // Initial load
        loadUsers();
    </script>
</body>
</html>
