<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quack Quiz - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fade-in 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="absolute top-[10%] right-[10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>

    <div class="max-w-3xl w-full bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-2xl shadow-2xl p-6 sm:p-8 z-10">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 border-b border-slate-700 pb-4 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">🦆 Quack Quiz</h1>
                <p class="text-slate-400 text-sm mt-1">Player: <span id="nav-username" class="font-bold text-blue-400">...</span></p>
            </div>
            <div id="user-profile" class="text-center sm:text-right">
                <p class="text-sm font-medium text-slate-300 bg-slate-800 px-4 py-1 rounded-full border border-slate-700 inline-block">Score: <span id="nav-score" class="text-green-400">0</span></p>
                <div class="mt-2 flex gap-3 justify-center sm:justify-end items-center">
                    <button onclick="logout()" class="text-xs text-slate-500 hover:text-red-400 underline transition">Logout</button>
                    <div id="admin-btn-container"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
            <button onclick="startQuiz('Python')" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-blue-300 py-3 rounded-xl transition active:scale-95">Python</button>
            <button onclick="startQuiz('AI')" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-purple-300 py-3 rounded-xl transition active:scale-95">AI</button>
            <button onclick="startQuiz('Trivia')" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-emerald-300 py-3 rounded-xl transition active:scale-95">Trivia</button>
            <button onclick="startQuiz('History')" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-amber-300 py-3 rounded-xl transition active:scale-95">History</button>
        </div>

        <div id="game-area" class="hidden bg-slate-950/50 border border-slate-700 rounded-xl p-6 animate-fade">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xs uppercase tracking-widest text-slate-500">The Fact</h2>
                <button onclick="skipQuestion()" class="text-[10px] uppercase font-bold text-slate-400 hover:text-white bg-slate-800 px-2 py-1 rounded border border-slate-700 transition">Skip ➔</button>
            </div>
            
            <p id="fact-display" class="text-xl font-light text-slate-100 mb-6 leading-relaxed"></p>
            
            <button id="hint-btn" onclick="showHint()" class="text-sm text-amber-500 hover:text-amber-400 underline mb-4 inline-block">Reveal Hint</button>
            <p id="hint-display" class="hidden text-sm text-amber-200 mb-6 italic bg-amber-900/20 p-3 rounded border border-amber-900/30"></p>
            
            <div class="flex gap-3">
                <input type="text" id="user-guess" onkeypress="handleKeyPress(event)" placeholder="What is...?" class="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                <button onclick="submitGuess()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-blue-900/20 transition active:scale-95">Guess</button>
            </div>
            <p id="result-message" class="mt-4 text-center font-medium min-h-[1.5rem]"></p>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('quack_user_id');
        // Convert the "true"/"false" string from localStorage back to a real boolean
        const isAdmin = localStorage.getItem('quack_is_admin') === 'true';
        let currentTopic = "";

        window.onload = () => {
            // 1. Auth Guard
            if (!userId || userId === 'null') { 
                window.location.assign(window.location.origin + '/login');
                return;
            }
            
            // 2. Set User UI
            document.getElementById('nav-username').innerText = localStorage.getItem('quack_username') || 'Unknown';
            document.getElementById('nav-score').innerText = localStorage.getItem('quack_score') || 0;
            
            // 3. Show Admin Link if permitted
            if (isAdmin) {
                document.getElementById('admin-btn-container').innerHTML = `
                    <a href="/admin" class="text-xs font-bold text-rose-400 border border-rose-500/30 rounded px-2 py-1 bg-rose-500/10 hover:bg-rose-500/20 transition">🛡️ Admin</a>
                `;
            }
        };

        function logout() { 
            localStorage.clear(); 
            window.location.assign(window.location.origin + '/login');
        }

        async function startQuiz(topic) {
            currentTopic = topic;
            const gameArea = document.getElementById('game-area');
            const factDisplay = document.getElementById('fact-display');
            const resMsg = document.getElementById('result-message');
            
            gameArea.classList.remove('hidden');
            factDisplay.innerHTML = `<span class="text-slate-500 italic">Generating ${topic} quiz...</span>`;
            document.getElementById('hint-display').classList.add('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');
            resMsg.innerText = "";
            document.getElementById('user-guess').value = "";

            try {
                const response = await fetch('/api/generate_quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic })
                });
                if (!response.ok) throw new Error('AI was unable to generate a fact.');
                
                const data = await response.json();
                factDisplay.innerText = data.fact;
                document.getElementById('hint-display').innerText = "Hint: " + data.hint;
                window.currentAnswer = data.answer_key;
            } catch (error) {
                factDisplay.innerText = "Error: " + error.message;
            }
        }

        function showHint() { 
            document.getElementById('hint-display').classList.remove('hidden'); 
            document.getElementById('hint-btn').classList.add('hidden');
        }

        function skipQuestion() {
            if (currentTopic) startQuiz(currentTopic);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') submitGuess();
        }

        async function submitGuess() {
            const guessInput = document.getElementById('user-guess');
            const guess = guessInput.value.trim();
            if (!guess || !window.currentAnswer) return;

            const resMsg = document.getElementById('result-message');
            resMsg.innerText = "Checking answer...";
            resMsg.className = "mt-4 text-center font-medium text-slate-400";

            try {
                const response = await fetch('/api/validate_guess', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_guess: guess, 
                        answer_key: window.currentAnswer, 
                        user_id: parseInt(userId) 
                    })
                });
                
                const data = await response.json();
                
                if (data.is_correct) {
                    resMsg.innerText = "✅ Correct! +10 Points";
                    resMsg.className = "mt-4 text-center font-bold text-emerald-400 animate-bounce";
                    document.getElementById('nav-score').innerText = data.new_score;
                    localStorage.setItem('quack_score', data.new_score);
                    
                    // Small delay before next question for satisfaction
                    setTimeout(() => startQuiz(currentTopic), 1500);
                } else {
                    resMsg.innerText = "❌ Not quite. The concept was: " + window.currentAnswer;
                    resMsg.className = "mt-4 text-center font-bold text-rose-400";
                }
            } catch (error) {
                resMsg.innerText = "Error checking answer.";
                resMsg.className = "mt-4 text-center font-bold text-rose-500";
            }
        }
    </script>
</body>
</html>
