<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quack Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-64 h-64 md:w-96 md:h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 md:w-96 md:h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>

    <div class="max-w-md w-full bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-2xl shadow-2xl p-6 sm:p-8 z-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">🦆 Portal</h1>
            <p class="text-slate-400 text-sm">Create an account or sign in.</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                <input type="text" id="username" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 text-white placeholder-slate-500 transition" placeholder="student_123">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" id="password" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 text-white placeholder-slate-500 transition" placeholder="••••••••">
            </div>
            
            <p id="auth-msg" class="text-sm font-medium text-center hidden"></p>

            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 pt-2">
                <button onclick="handleAuth('/api/login')" class="flex-1 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-purple-500/30 transition duration-300">Login</button>
                <button onclick="handleAuth('/api/register')" class="flex-1 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white font-semibold py-3 rounded-lg shadow transition duration-300">Sign Up</button>
            </div>
        </div>
    </div>

    <script>
        async function handleAuth(endpoint) {
            const userEl = document.getElementById('username');
            const passEl = document.getElementById('password');
            const msgEl = document.getElementById('auth-msg');

            const user = userEl.value.trim();
            const pass = passEl.value;

            if(!user || !pass) return;

            msgEl.className = "text-sm font-medium text-center text-blue-400 block";
            msgEl.innerText = "Processing...";

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await response.json();

                if (response.ok) {
                    msgEl.className = "text-sm font-medium text-center text-green-400 block";
                    
                    if (endpoint === '/api/login') {
                        msgEl.innerText = data.message;
                        // CRITICAL FIX: Storing all user data including admin status
                        localStorage.setItem('quack_user_id', data.user_id);
                        localStorage.setItem('quack_username', data.username);
                        localStorage.setItem('quack_score', data.score);
                        localStorage.setItem('quack_is_admin', data.is_admin); 
                        
                        setTimeout(() => window.location.href = '/', 1000);
                    } else if (endpoint === '/api/register') {
                        userEl.value = '';
                        passEl.value = '';
                        msgEl.innerText = "Account created! You can now log in.";
                    }
                } else {
                    msgEl.className = "text-sm font-medium text-center text-red-400 block";
                    msgEl.innerText = data.detail || "Authentication failed.";
                }
            } catch (err) {
                msgEl.className = "text-sm font-medium text-center text-red-400 block";
                msgEl.innerText = "Server error connection failed.";
            }
        }
    </script>
</body>
</html>
